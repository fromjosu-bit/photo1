<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>의랑초 인생네컷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 귀여운 폰트(Jua)와 힙한 폰트(Black Han Sans), 기본 UI 폰트(Noto Sans KR) 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            user-select: none;
            -webkit-user-select: none;
        }
        /* 캔버스에 폰트를 그리기 위해 미리 로드해두는 숨김 처리 */
        .font-preload { position: absolute; opacity: 0; pointer-events: none; }
        
        /* 앱 컨테이너 (깔끔한 그림자 및 모서리 둥글게) */
        .app-container {
            background-color: white;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .camera-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #000;
            overflow: hidden;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 거울 모드 */
        }

        #countdown-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            display: none;
            z-index: 10;
        }

        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.1s ease-out;
        }
        .flash.active { opacity: 1; }

        /* 결과 미리보기 이미지 */
        #preview-image {
            width: 100%;
            height: auto;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        /* 프레임 선택 라디오 버튼 스타일링 */
        .frame-selector input[type="radio"] { display: none; }
        .frame-selector label {
            display: inline-block;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .frame-selector input[type="radio"]:checked + label.hip-label {
            background-color: #111; color: white; border-color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .frame-selector input[type="radio"]:not(:checked) + label.hip-label {
            background-color: #f3f4f6; color: #4b5563;
        }
        .frame-selector input[type="radio"]:checked + label.cute-label {
            background-color: #FFF06C; color: #8B4513; border-color: #FFD700; box-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }
        .frame-selector input[type="radio"]:not(:checked) + label.cute-label {
            background-color: #f3f4f6; color: #4b5563;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-6 px-4">

    <!-- 폰트 강제 로드용 숨김 요소 -->
    <div class="font-preload">
        <span style="font-family: 'Jua';">폰트로드</span>
        <span style="font-family: 'Black Han Sans';">폰트로드</span>
    </div>

    <!-- 메인 앱 컨테이너 -->
    <div class="app-container w-full max-w-lg flex flex-col items-center">
        
        <!-- 촬영 전 / 촬영 중 화면 (View 1) -->
        <div id="view-camera" class="w-full flex flex-col items-center">
            <div class="py-6 text-center">
                <h1 class="text-3xl font-bold text-gray-800">📸 의랑초 포토부스</h1>
                <p class="text-gray-500 mt-1">친구사랑주간 인생네컷</p>
            </div>

            <div class="camera-wrap w-full">
                <video id="camera" autoplay playsinline muted></video>
                <div id="countdown-display">5</div>
                <div id="flash" class="flash"></div>
            </div>

            <div class="w-full p-6 bg-white">
                <button id="start-btn" class="w-full py-4 rounded-2xl bg-gray-900 hover:bg-black text-white text-2xl font-bold transition-transform active:scale-95 shadow-lg">
                    사진 찍기 시작
                </button>
                <p id="status-text" class="text-center text-xl text-indigo-600 font-bold hidden py-4">
                    카메라를 보세요! (<span id="photo-count">0</span>/4)
                </p>
            </div>
        </div>

        <!-- 촬영 완료 및 프레임 선택 화면 (View 2) -->
        <div id="view-result" class="w-full flex flex-col items-center p-6 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">✨ 찰칵! 사진 완성 ✨</h2>
            
            <!-- 완성본 미리보기 -->
            <div class="w-full max-w-sm mb-6 relative">
                <img id="preview-image" src="" alt="완성된 사진 미리보기">
            </div>

            <!-- 프레임 선택기 -->
            <div class="w-full bg-gray-50 p-4 rounded-2xl mb-6">
                <p class="text-center text-sm text-gray-500 font-bold mb-3">👇 원하는 프레임을 선택하세요 👇</p>
                <div class="flex justify-center gap-3 frame-selector">
                    <div>
                        <input type="radio" id="style-cute" name="frame-style" value="cute" checked>
                        <label for="style-cute" class="cute-label" style="font-family: 'Jua', sans-serif; font-size: 1.1rem;">
                            💛 귀여운 노랑
                        </label>
                    </div>
                    <div>
                        <input type="radio" id="style-hip" name="frame-style" value="hip">
                        <label for="style-hip" class="hip-label" style="font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; letter-spacing: 1px;">
                            🖤 힙한 흑백
                        </label>
                    </div>
                </div>
            </div>

            <!-- 하단 버튼들 -->
            <div class="w-full flex gap-3">
                <button id="retake-btn" class="flex-1 py-4 rounded-xl bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold transition-colors active:scale-95">
                    다시 찍기
                </button>
                <button id="download-btn" class="flex-[2] py-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-colors shadow-lg active:scale-95 text-lg">
                    다운로드 (JPG)
                </button>
            </div>
        </div>

    </div>

    <!-- 사진 캡처 및 최종 4x6 합성용 숨김 캔버스 -->
    <canvas id="capture-canvas" style="display: none;"></canvas>
    <canvas id="final-canvas" width="1200" height="1800" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('camera');
        const startBtn = document.getElementById('start-btn');
        const viewCamera = document.getElementById('view-camera');
        const viewResult = document.getElementById('view-result');
        const downloadBtn = document.getElementById('download-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const countdownDisplay = document.getElementById('countdown-display');
        const flash = document.getElementById('flash');
        const statusText = document.getElementById('status-text');
        const photoCountSpan = document.getElementById('photo-count');
        const previewImage = document.getElementById('preview-image');
        const styleRadios = document.querySelectorAll('input[name="frame-style"]');
        
        let photos = [];
        let stream = null;
        let currentStyle = 'cute';

        // 1. 카메라 권한 요청 및 비디오 연결
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1080 }, height: { ideal: 1440 } },
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error(err);
                alert("카메라 권한이 필요합니다. 브라우저 설정에서 카메라를 허용해주세요!");
            }
        }
        initCamera();

        // 2. 사진 찍기 시작 버튼 클릭
        startBtn.addEventListener('click', async () => {
            photos = [];
            startBtn.classList.add('hidden');
            statusText.classList.remove('hidden');
            photoCountSpan.innerText = "0";

            for (let i = 0; i < 4; i++) {
                await runCountdown(5);
                const photoDataUrl = capturePhoto();
                photos.push(photoDataUrl);
                photoCountSpan.innerText = i + 1;
                if (i < 3) await delay(1000);
            }

            // 촬영 완료 후 결과 화면으로 전환
            viewCamera.classList.add('hidden');
            viewResult.classList.remove('hidden');
            
            // 기본 스타일로 렌더링
            renderFinalImage();
        });

        // 라디오 버튼(프레임 선택) 변경 이벤트
        styleRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentStyle = e.target.value;
                renderFinalImage(); // 스타일 바뀔때마다 캔버스 새로 그림
            });
        });

        // 3. 카운트다운 함수
        function runCountdown(seconds) {
            return new Promise(resolve => {
                let timeLeft = seconds;
                countdownDisplay.style.display = 'block';
                countdownDisplay.innerText = timeLeft;

                const timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        countdownDisplay.innerText = timeLeft;
                    } else {
                        clearInterval(timer);
                        countdownDisplay.style.display = 'none';
                        flash.classList.add('active');
                        setTimeout(() => flash.classList.remove('active'), 150);
                        resolve();
                    }
                }, 1000);
            });
        }

        // 4. 비디오 캡처
        function capturePhoto() {
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            const targetWidth = 900;
            const targetHeight = 1200;
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            const videoRatio = video.videoWidth / video.videoHeight;
            const targetRatio = targetWidth / targetHeight;
            let sourceX = 0, sourceY = 0, sourceWidth = video.videoWidth, sourceHeight = video.videoHeight;

            if (videoRatio > targetRatio) {
                sourceWidth = video.videoHeight * targetRatio;
                sourceX = (video.videoWidth - sourceWidth) / 2;
            } else {
                sourceHeight = video.videoWidth / targetRatio;
                sourceY = (video.videoHeight - sourceHeight) / 2;
            }

            ctx.translate(targetWidth, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetWidth, targetHeight);
            
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        // 5. 프레임 합성 렌더링 (핵심 수정 부분)
        function renderFinalImage() {
            const canvas = document.getElementById('final-canvas');
            const ctx = canvas.getContext('2d');

            // --- 프레임 테마 설정 ---
            if (currentStyle === 'cute') {
                ctx.fillStyle = '#FFF9E6'; // 따뜻한 연노랑
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 귀여운 테두리
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 15;
                ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            } else { // hip style
                ctx.fillStyle = '#111111'; // 완전 블랙
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 힙한 얇은 흰색 테두리
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 4;
                ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);
                ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);
            }

            // --- 사진 배치 계산 ---
            const padding = 70;
            const spacing = 40;
            const photoWidth = (1200 - (padding * 2) - spacing) / 2;
            const photoHeight = photoWidth * (4/3);
            
            // 상단 텍스트 공간을 위해 사진 시작 위치(startY)를 아래로 내림 (기존 100 -> 200)
            const startY = 200; 

            // 비동기 이미지 로딩 처리를 위한 Promise 배열
            const loadPromises = photos.map((photoUrl, index) => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        const col = index % 2;
                        const row = Math.floor(index / 2);
                        const x = padding + (col * (photoWidth + spacing));
                        const y = startY + (row * (photoHeight + spacing));

                        // 프레임에 따른 사진 효과
                        if (currentStyle === 'cute') {
                            // 사진 배경(흰색 테두리)
                            ctx.fillStyle = '#FFFFFF';
                            roundRect(ctx, x - 15, y - 15, photoWidth + 30, photoHeight + 30, 20);
                            ctx.fill();
                            // 둥근 모서리로 사진 그리기
                            ctx.save();
                            roundRect(ctx, x, y, photoWidth, photoHeight, 10);
                            ctx.clip();
                            ctx.drawImage(img, x, y, photoWidth, photoHeight);
                            ctx.restore();
                        } else {
                            // 힙한 스타일: 직각, 얇은 테두리 (사진 컬러 유지)
                            ctx.fillStyle = '#333333';
                            ctx.fillRect(x - 5, y - 5, photoWidth + 10, photoHeight + 10);
                            
                            ctx.save();
                            ctx.drawImage(img, x, y, photoWidth, photoHeight);
                            ctx.restore();
                        }
                        resolve();
                    };
                    img.src = photoUrl;
                });
            });

            // 모든 사진이 그려진 후에 텍스트와 장식 그리기
            Promise.all(loadPromises).then(() => {
                // 상단 한 줄 텍스트 Y좌표 (위에서 110px 내려온 지점)
                const topTextY = 110; 
                // 하단 날짜 Y좌표 (전체 1800 픽셀 중 사진이 1600픽셀에서 끝나므로 1700에 위치시켜 하단 여백의 정중앙에 배치)
                const bottomDateY = 1700;  
                
                if (currentStyle === 'cute') {
                    // 귀여운 폰트 및 텍스트 (상단)
                    ctx.fillStyle = '#FF69B4'; // 핑크
                    ctx.font = 'bold 70px "Jua", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('의랑초등학교 친구사랑주간', canvas.width / 2, topTextY);
                    
                    // 귀여운 폰트 날짜 (하단)
                    ctx.fillStyle = '#8B4513'; // 갈색
                    ctx.font = '45px "Jua", sans-serif';
                    ctx.fillText('2026.3.30. ~ 4.3.', canvas.width / 2, bottomDateY);

                } else {
                    // 힙한 폰트 및 텍스트 (상단)
                    ctx.fillStyle = '#FFFFFF'; // 흰색
                    ctx.font = '75px "Black Han Sans", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('의랑초등학교 친구사랑주간', canvas.width / 2, topTextY);
                    
                    // 힙한 폰트 날짜 (하단)
                    ctx.fillStyle = '#AAAAAA'; // 회색 날짜
                    ctx.font = '45px "Black Han Sans", sans-serif';
                    ctx.fillText('2026.3.30. ~ 4.3.', canvas.width / 2, bottomDateY);
                }

                // 캔버스 그림이 완성되면 미리보기 이미지 태그에 적용!
                previewImage.src = canvas.toDataURL('image/jpeg', 0.95);
            });
        }

        // --- 유틸리티 함수들 ---
        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // 모서리가 둥근 사각형 그리기
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 6. 버튼 이벤트들
        downloadBtn.addEventListener('click', () => {
            const canvas = document.getElementById('final-canvas');
            const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
            const link = document.createElement('a');
            const styleName = currentStyle === 'cute' ? '귀여운노랑' : '힙한흑백';
            // 파일명 뒤에 현재 시간(밀리초)을 붙여서 항상 다른 이름으로 저장되게 처리
            const timestamp = Date.now();
            link.download = `의랑초_인생네컷_${styleName}_${timestamp}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        retakeBtn.addEventListener('click', () => {
            viewResult.classList.add('hidden');
            viewCamera.classList.remove('hidden');
            startBtn.classList.remove('hidden');
            statusText.classList.add('hidden');
            previewImage.src = "";
        });
    </script>
</body>
</html>
